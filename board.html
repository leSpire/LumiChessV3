<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiChess · Board Foundation</title>
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar card-glass">
        <div class="brand">
          <div class="brand-logo">♟</div>
          <div>
            <h1>LumiChess</h1>
            <p>Fondation échiquier</p>
          </div>
        </div>

        <nav class="side-nav">
          <a class="nav-item" href="index.html">Accueil</a>
          <a class="nav-item active" href="board.html">Échiquier interactif</a>
          <a class="nav-item" href="auth.html">Compte</a>
          <a class="nav-item" href="profile.html">Profil</a>
        </nav>
      </aside>

      <main class="main-area card-glass board-page">
        <section class="board-layout">
          <article class="board-card card-glass">
            <header class="board-header">
              <div>
                <h2>Module échiquier LumiChess</h2>
                <p class="muted">Règles complètes, interaction drag/click, FEN, PGN, historique.</p>
              </div>
              <div class="board-badges">
                <span id="turnBadge" class="chip">Trait: Blancs</span>
                <span id="statusLine" class="chip">Partie en cours</span>
              </div>
            </header>

            <div id="boardRoot" class="lc-board-shell" aria-label="Échiquier interactif"></div>

            <div class="board-actions">
              <button id="resetBtn" class="ghost-btn" type="button">Reset</button>
              <button id="flipBtn" class="ghost-btn" type="button">Inverser</button>
            </div>
          </article>

          <article class="board-side card-glass">
            <h3>Historique</h3>
            <ol id="historyList" class="lc-history"></ol>

            <label class="board-field">
              FEN
              <textarea id="fenField" rows="3"></textarea>
            </label>
            <button id="loadFenBtn" class="ghost-btn" type="button">Charger FEN</button>

            <label class="board-field">
              PGN (export)
              <textarea id="pgnField" rows="5" readonly></textarea>
            </label>
          </article>
        </section>
      </main>
    </div>

    <dialog id="promotionModal" class="promotion-modal">
      <h4>Promotion</h4>
      <p>Choisis la pièce de promotion.</p>
      <div id="promotionChoices" class="promotion-choices">
        <button type="button" data-promotion="q">♕ Dame</button>
        <button type="button" data-promotion="r">♖ Tour</button>
        <button type="button" data-promotion="b">♗ Fou</button>
        <button type="button" data-promotion="n">♘ Cavalier</button>
      </div>
    </dialog>

    <script type="module" src="scripts/board-page.js"></script>
  </body>
</html>
